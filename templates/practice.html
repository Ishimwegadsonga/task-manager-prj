<!DOCTYPE html>
<html>
    <head>
        <title>login</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

          <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


        <style>
            *{
             margin: 0;
             padding: 0;
             box-sizing:border-box;
            }

            body {
                min-height: 100vh;
                display: flex;  
                justify-content: center;
                background: #f2f2f2;
                align-items: center;
                
                 padding: 20px;

                font-family: arial, sans-serif;

                background:linear-gradient(
                    135deg,
                    #4fa,
                    #00f2fe
                );
            }

            .login-card{
                width: 100%;
                max-width: 400px;

                background: white;
                padding: 20px;
                border-radius: 25px;

             box-shadow: 
             0 10px 30px rgba(0,0,0,0.2);
             
             animation: fadeIn 0.7s ease;
            }

            .login-card h2{
                text-align: center;
                margin-bottom: 30px;
                font-weight: bold;
                color:#0d6efd;
            }

            .form-control{
                border-radius: 12px;
                padding: 12px;
            }

            .btn-custom{
                width: 100%;
                border-radius: 12px
                padding: 12px;
                font-weight:bold;
                transition:0.3s;
            }

            .btn-custom:hover{
                transform: scale(1.03);
            }

            .link{
                text-align: center;
                margin-top: 40px;
            }

            .link a{
                text-decoration: none;
                font-weight: bold;
            }

            @keyframes fadeIn{
                from{
                    opacity: 0;
                    transform: translateY(20px);
                }

                to{
                   opacity: 1;
                   transform: translateY(0);
                }
            }

        @media(max-width:768px){

            .login-card{
                padding:25px;
            }

            h2{
                font-size: 28px;
            }

            .form-control{
                font-size: 14px;
            }

            .btn-custom{
                width: 100%;
            }
        }    

         </style>

         </head>  
         
         <body>
            <div class="login-card">

                <h2>
            <i class="bi bi-person-circle"></i>
            sign in
                </h2>
            
            {% if message %}
            <div class="alert alert-success">
                {{ message }}
            </div>
            {% endif %}


<form action="/login" method="POST">

    <div class="mb-3">

    <input
     type="text"
     name="username"
     class="form-control"
     placeholder="ENTER USER NAME"
     required>

    </div>

    <div class="mb-3">


    <input
     type="password"
     name="password"
     class="form-control"
     placeholder="ENTER UR password"
     required>

    </div>

    <button
     type="submit"
     class="btn btn-primary btn-custom">
     
     <i class="bi bi-box-arrow-in-right"></i>
     login

    </button>

     <br><br>

    <div class="text-center mt-3">

        <a
        href="/forgot_password"
        class="text-decoration-none">

        <i class="bi bi-key-fill"></i>

        forgot_password?

        </a>

    </div>

   
</form>

<div class="link">
    dont't have an account?

    <a href="/register">
        create account
      </a>
  </div>
</div>

</body>
</html>
