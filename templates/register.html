<!DOCTYPE html>
<html>
    <head>
     <title>register</title>
     <style>
         *{
         margin: 0;
            padding: 0;
            box-sizing: border-box;
        
        }

        body{
            font-family: Arial;
            background: gray;
            justify-items: center;
            justify-content: center;
        }

        .container { width: 300px;
            margin: 150px;
            padding: 20px;
            background: brown;
            border-radius: 15px;
            box-shadow: 0 0 30px red;
            text-align: center;

        }

        input { width: 80%;
            margin: 8px;
            padding: 9px 0;
            background-color: mediumturquoise;

        }

         button:hover {
           padding: 10px;
           background: red;
           color: white;
           border: none;
            border-radius: 4px;
        }

         button:hover {
            background: darkred;
        }

        .message {
            color: black;
        }
        

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background: yellow;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

          a:hover {
            background: gold;
        }
         
        </style>
    </head>
    <body>
        <div class="container">
      <h2>register</h2>
    {% if message %}
        <p style="color: black; font-weight: bold;">{{ message }}</p> 
        {% endif %} 
    
     <form action="/register" method="POST">
            <input type="text" name="username" placeholder="choose username">
            <input type="password" name="password" placeholder="choose password">
            <button type="submit">register</button>
        </form>
        <br>
        <a href="/">GO BACK TO LOGIN</a>

    </div>
    </body>
</html>
