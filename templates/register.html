<!DOCTYPE html>
<html>
    <head>
     <title>register</title>

     <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

     <style>
         *{
           margin: 0;
            padding: 0;
            box-sizing: border-box;
        
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-items: center;
            justify-content: center;
            align-items: center;

            padding: 20px;

            font-family: Arial, sans-serif;

            background: linear-gradient(
             135deg,
             #232526,
             #414345
            );
        }



        .register-card{

            width: 100%;
            max-width: 400px;
            background: white;

            padding: 40px;
            border-radius: 25px;

            box-shadow: 
            0 10px 30px rgba(0,0,0,0.2);

            animation: fadeIn 0.7s ease;
        }

        .register-card h2{
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            color:#6f42c1;

        }

        .form-control{
            border-radius: 12px;
            padding: 12px;
        }

        .btn-custom{
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform: scale(1.03);
                }

                .link{
                    text-align: center;
                    margin-top: 20px;
                }

                .link a{
                    text-decoration: none;
                    font-weight: bold;
                }
                @keyframes fadeIn{
                    from{
                        opacity: 0;
                        transform: translateY(20px);
                    }
                    to{
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
        
            @media(max-width:768px);{
                .register-card{
                    padding: 25px;
                }
                h2{
                    font-size: 28px;
                }

            .form-control{
                font-size: 14px;
            }

            .btn-custom{
                width: 100%;
             }
            }

                </style>

    </head>

    <body>

        <div class="register-card">

      <h2>

        <i class="bi bi-person-plus-fill"></i>
        register

      </h2>


    {% if message %}
    <div class="alert alert-warning">
        {{ message }} 
    </div>
        {% endif %} 
    
     <form action="/register" method="POST">

        <div class="mb-3">

            <input
             type="text"
             name="username"
             class="form-control"
             placeholder="choose username"
             required>

        </div>

        <div class="mb-3">

            <input type="password"
            name="password"
            class="form-control"
            placeholder="choose password"
            required>

        </div>

            <button type="submit"
            class="btn btn-primary btn-custom">

            <i class="bi bi-person-check-fill"></i>
            register
                
            </button>
        </form>
        
        <div class="link">

            already have an account?

        <a href="/">
            Login
        </a>

    </div>
</div>
    </body>
</html>
